<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSurat Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .active-nav {
            background-color: #2563eb;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-slate-900 transition-all duration-300 flex flex-col z-20 shrink-0">
            <div class="p-6 flex items-center space-x-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shrink-0">
                    <i data-lucide="file-text"></i>
                </div>
                <h1 class="sidebar-text text-xl font-bold text-white tracking-tight overflow-hidden whitespace-nowrap">eSurat v2.0</h1>
            </div>

            <nav class="flex-1 px-4 mt-4 space-y-2">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span class="sidebar-text font-medium">Dashboard</span>
                </button>
                <button onclick="switchTab('surat-masuk')" id="nav-surat-masuk" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors">
                    <i data-lucide="inbox" class="w-5 h-5"></i>
                    <span class="sidebar-text font-medium">Surat Masuk</span>
                </button>
                <button onclick="switchTab('surat-keluar')" id="nav-surat-keluar" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    <span class="sidebar-text font-medium">Surat Keluar</span>
                </button>
                <button onclick="switchTab('disposisi')" id="nav-disposisi" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="sidebar-text font-medium">Disposisi</span>
                </button>
                <button onclick="switchTab('settings')" id="nav-settings" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span class="sidebar-text font-medium">Pengaturan</span>
                </button>
            </nav>

            <div class="p-4 mt-auto">
                <button onclick="toggleSidebar()" class="w-full flex items-center justify-center p-2 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white">
                    <i id="sidebar-toggle-icon" data-lucide="menu"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
                <div class="flex items-center flex-1 max-w-md">
                    <i data-lucide="search" class="text-slate-400 mr-2 w-5 h-5"></i>
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Cari surat, pengirim, atau no agenda..." 
                        class="w-full border-none focus:ring-0 text-sm outline-none"
                    >
                </div>
                
                <div class="flex items-center space-x-6">
                    <div class="flex flex-col items-end hidden sm:flex">
                        <span class="text-sm font-semibold">Admin Utama</span>
                        <span class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">System Administrator</span>
                    </div>
                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold cursor-pointer hover:bg-blue-200 transition-colors">
                        AU
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div id="content-area" class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <!-- Content will be injected here by JS -->
            </div>
        </main>
    </div>

    <!-- Modal for adding new item -->
    <div id="modal-container" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-6 hidden">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden transform transition-all">
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 id="modal-title" class="text-xl font-bold text-slate-900">Tambah Surat</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="mail-form" class="p-8 space-y-5">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase">Judul/Perihal Surat</label>
                    <input 
                        id="form-title"
                        required
                        type="text" 
                        placeholder="Contoh: Undangan Koordinasi..."
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label id="label-origin" class="text-xs font-bold text-slate-500 uppercase">Pengirim</label>
                        <input 
                            id="form-origin"
                            required
                            type="text" 
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase">Prioritas</label>
                        <select 
                            id="form-priority"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-no-repeat bg-[right_1rem_center]"
                        >
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase">Keterangan Singkat</label>
                    <textarea 
                        id="form-description"
                        rows="3"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                    ></textarea>
                </div>
                <div class="pt-4 flex space-x-4">
                    <button 
                        type="button"
                        onclick="closeModal()"
                        class="flex-1 py-3 border border-slate-200 rounded-xl font-bold text-slate-600 hover:bg-slate-50"
                    >
                        Batal
                    </button>
                    <button 
                        type="submit"
                        class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 active:scale-95 transition-all"
                    >
                        Simpan Data
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- State Management ---
        let state = {
            activeTab: 'dashboard',
            isSidebarOpen: true,
            searchTerm: '',
            data: {
                incoming: [
                    { id: 'IN-001', title: 'Undangan Rapat Koordinasi', sender: 'Kementerian Keuangan', date: '2024-03-01', category: 'Undangan', status: 'Pending', priority: 'High', description: 'Pembahasan anggaran tahunan di Jakarta.' },
                    { id: 'IN-002', title: 'Laporan Proyek Semester 1', sender: 'PT. Maju Bersama', date: '2024-03-05', category: 'Laporan', status: 'Processed', priority: 'Medium', description: 'Progress report pembangunan infrastruktur.' },
                    { id: 'IN-003', title: 'Permohonan Magang Mahasiswa', sender: 'Universitas Indonesia', date: '2024-03-08', category: 'Permohonan', status: 'Approved', priority: 'Low', description: 'Pengajuan magang untuk 3 mahasiswa Teknik.' },
                ],
                outgoing: [
                    { id: 'OUT-001', title: 'Surat Balasan Kerjasama', recipient: 'PT. Teknologi Jaya', date: '2024-03-02', category: 'Kerjasama', status: 'Sent', priority: 'Medium' },
                    { id: 'OUT-002', title: 'Pemberitahuan Cuti Bersama', recipient: 'Seluruh Karyawan', date: '2024-03-07', category: 'Internal', status: 'Draft', priority: 'High' },
                ]
            }
        };

        // --- Core Functions ---

        function init() {
            lucide.createIcons();
            switchTab('dashboard');

            // Search Event
            document.getElementById('search-input').addEventListener('input', function(e) {
                state.searchTerm = e.target.value;
                updateView();
            });

            // Form Submit
            document.getElementById('mail-form').addEventListener('submit', handleAddMail);
        }

        function toggleSidebar() {
            state.isSidebarOpen = !state.isSidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const toggleIcon = document.getElementById('sidebar-toggle-icon');
            const textElements = document.querySelectorAll('.sidebar-text');

            if (state.isSidebarOpen) {
                sidebar.classList.remove('w-20');
                sidebar.classList.add('w-64');
                toggleIcon.setAttribute('data-lucide', 'menu');
                textElements.forEach(function(el) { el.classList.remove('hidden'); });
            } else {
                sidebar.classList.remove('w-64');
                sidebar.classList.add('w-20');
                toggleIcon.setAttribute('data-lucide', 'menu'); 
                textElements.forEach(function(el) { el.classList.add('hidden'); });
            }
            lucide.createIcons();
        }

        function switchTab(tabId) {
            state.activeTab = tabId;
            
            // Update Active Nav Style
            document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active-nav'); });
            document.getElementById('nav-' + tabId).classList.add('active-nav');

            updateView();
        }

        function getBadgeClass(val) {
            const styles = {
                High: 'bg-red-100 text-red-700',
                Medium: 'bg-amber-100 text-amber-700',
                Low: 'bg-green-100 text-green-700',
                Pending: 'bg-slate-100 text-slate-700',
                Processed: 'bg-blue-100 text-blue-700',
                Approved: 'bg-emerald-100 text-emerald-700',
                Sent: 'bg-indigo-100 text-indigo-700',
                Draft: 'bg-gray-100 text-gray-700',
            };
            return 'px-2.5 py-0.5 rounded-full text-xs font-semibold ' + (styles[val] || styles.Pending);
        }

        function updateView() {
            const container = document.getElementById('content-area');
            
            if (state.activeTab === 'dashboard') {
                renderDashboard(container);
            } else if (state.activeTab === 'surat-masuk' || state.activeTab === 'surat-keluar') {
                renderTable(container);
            } else if (state.activeTab === 'disposisi') {
                renderEmpty(container, 'Users', 'Alur Disposisi', 'Modul disposisi digunakan untuk meneruskan surat dari atasan ke bawahan dengan instruksi khusus.');
            } else if (state.activeTab === 'settings') {
                renderSettings(container);
            }

            lucide.createIcons();
        }

        // --- Render Views ---

        function renderDashboard(container) {
            const recentActivities = [...state.data.incoming, ...state.data.outgoing].slice(0, 4);
            const priorities = ['High', 'Medium', 'Low'];

            container.innerHTML = `
                <div class="space-y-8 animate-in fade-in duration-500">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-900">Ringkasan Sistem</h2>
                            <p class="text-slate-500 mt-1">Data statistik persuratan periode Maret 2024</p>
                        </div>
                        <button class="flex items-center px-4 py-2 border border-slate-200 rounded-lg bg-white text-sm font-medium hover:bg-slate-50">
                            <i data-lucide="calendar" class="mr-2 w-4 h-4"></i>
                            7 Hari Terakhir
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        ${renderStatCard('Total Surat Masuk', state.data.incoming.length, 'inbox', '12%', 'bg-blue-600')}
                        ${renderStatCard('Total Surat Keluar', state.data.outgoing.length, 'send', '5%', 'bg-emerald-600')}
                        ${renderStatCard('Pending Disposisi', '14', 'clock', '2%', 'bg-amber-500')}
                        ${renderStatCard('Arsip Tersimpan', '1.2k', 'file-text', '18%', 'bg-indigo-600')}
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                            <h3 class="font-bold text-lg mb-6 flex items-center text-slate-800">
                                <i data-lucide="clock" class="mr-2 text-blue-600 w-5 h-5"></i>
                                Aktivitas Terbaru
                            </h3>
                            <div class="space-y-6">
                                ${recentActivities.map(function(item) {
                                    return `
                                    <div class="flex items-start space-x-4 border-l-2 border-slate-100 pl-4 relative">
                                        <div class="absolute -left-[5px] top-0 w-2 h-2 rounded-full bg-blue-500"></div>
                                        <div class="flex-1">
                                            <div class="flex justify-between">
                                                <h4 class="font-semibold text-slate-900 text-sm">${item.title}</h4>
                                                <span class="text-xs text-slate-400">${item.date}</span>
                                            </div>
                                            <p class="text-xs text-slate-500 mt-1">${item.sender ? 'Diterima dari: ' + item.sender : 'Dikirim ke: ' + item.recipient}</p>
                                            <div class="mt-2">
                                                <span class="${getBadgeClass(item.status)}">${item.status}</span>
                                            </div>
                                        </div>
                                    </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                            <h3 class="font-bold text-lg mb-6 text-slate-800">Distribusi Prioritas</h3>
                            <div class="space-y-4">
                                ${priorities.map(function(p) {
                                    const percentage = p === 'High' ? '25%' : p === 'Medium' ? '50%' : '25%';
                                    const color = p === 'High' ? 'bg-red-500' : p === 'Medium' ? 'bg-amber-500' : 'bg-green-500';
                                    return `
                                    <div>
                                        <div class="flex justify-between text-sm mb-1">
                                            <span class="font-medium text-slate-600">${p} Priority</span>
                                            <span class="text-slate-400">${percentage}</span>
                                        </div>
                                        <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                            <div class="h-full ${color}" style="width: ${percentage}"></div>
                                        </div>
                                    </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStatCard(title, value, icon, trend, colorClass) {
            return `
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm font-medium text-slate-500">${title}</p>
                            <h3 class="text-2xl font-bold mt-1 text-slate-900">${value}</h3>
                        </div>
                        <div class="${colorClass} p-3 rounded-lg">
                            <i data-lucide="${icon}" class="text-white w-6 h-6"></i>
                        </div>
                    </div>
                    <div class="mt-4 flex items-center text-xs font-medium">
                        <span class="text-emerald-500 flex items-center">
                            <i data-lucide="arrow-up-right" class="mr-1 w-3 h-3"></i> ${trend}
                        </span>
                        <span class="text-slate-400 ml-2">dari bulan lalu</span>
                    </div>
                </div>
            `;
        }

        function renderTable(container) {
            const list = state.activeTab === 'surat-masuk' ? state.data.incoming : state.data.outgoing;
            const filtered = list.filter(function(item) {
                return item.title.toLowerCase().indexOf(state.searchTerm.toLowerCase()) !== -1 ||
                (item.sender || item.recipient).toLowerCase().indexOf(state.searchTerm.toLowerCase()) !== -1;
            });

            container.innerHTML = `
                <div class="animate-in slide-in-from-bottom-4 duration-500">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-900">${state.activeTab === 'surat-masuk' ? 'Surat Masuk' : 'Surat Keluar'}</h2>
                            <p class="text-slate-500 mt-1">Mengelola daftar korespondensi resmi.</p>
                        </div>
                        <button onclick="openModal()" class="flex items-center px-6 py-2.5 bg-blue-600 text-white rounded-lg font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">
                            <i data-lucide="plus" class="mr-2 w-5 h-5"></i>
                            Tambah Baru
                        </button>
                    </div>

                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                        <div class="px-6 py-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                            <span class="text-sm font-semibold text-slate-600">Menampilkan ${filtered.length} Dokumen</span>
                            <button class="text-slate-400 hover:text-slate-600"><i data-lucide="filter" class="w-5 h-5"></i></button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left whitespace-nowrap">
                                <thead>
                                    <tr class="bg-white text-slate-400 text-[11px] uppercase tracking-widest font-bold">
                                        <th class="px-6 py-4">Informasi Surat</th>
                                        <th class="px-6 py-4">Asal/Tujuan</th>
                                        <th class="px-6 py-4">Tgl & Kat</th>
                                        <th class="px-6 py-4">Status</th>
                                        <th class="px-6 py-4 text-right">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    ${filtered.map(function(item) {
                                        return `
                                        <tr class="hover:bg-slate-50 transition-colors group">
                                            <td class="px-6 py-4">
                                                <div class="flex flex-col">
                                                    <span class="font-bold text-slate-900 leading-tight mb-1">${item.title}</span>
                                                    <span class="text-xs text-blue-600 font-mono font-medium">${item.id}</span>
                                                </div>
                                            </td>
                                            <td class="px-6 py-4">
                                                <div class="flex items-center text-sm font-medium text-slate-600">
                                                    <i data-lucide="${item.sender ? 'arrow-down-left' : 'arrow-up-right'}" class="mr-2 w-4 h-4 ${item.sender ? 'text-blue-500' : 'text-emerald-500'}"></i>
                                                    ${item.sender || item.recipient}
                                                </div>
                                            </td>
                                            <td class="px-6 py-4">
                                                <div class="flex flex-col">
                                                    <span class="text-sm text-slate-600 font-medium">${item.date}</span>
                                                    <span class="text-xs text-slate-400">${item.category || 'Umum'}</span>
                                                </div>
                                            </td>
                                            <td class="px-6 py-4">
                                                <span class="${getBadgeClass(item.status)}">${item.status}</span>
                                            </td>
                                            <td class="px-6 py-4 text-right">
                                                <div class="flex justify-end space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button class="p-2 hover:bg-blue-50 text-blue-600 rounded-md transition-colors"><i data-lucide="eye" class="w-4 h-4"></i></button>
                                                    <button class="p-2 hover:bg-slate-100 text-slate-400 rounded-md transition-colors"><i data-lucide="download" class="w-4 h-4"></i></button>
                                                    <button onclick="deleteItem('${item.id}')" class="p-2 hover:bg-red-50 text-red-600 rounded-md transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                        ${filtered.length === 0 ? `
                            <div class="py-20 flex flex-col items-center justify-center text-slate-400">
                                <i data-lucide="inbox" class="mb-4 stroke-[1.5] w-12 h-12"></i>
                                <p class="font-medium text-lg text-slate-500">Tidak ada surat ditemukan</p>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderSettings(container) {
            container.innerHTML = `
                <div class="bg-white rounded-xl border border-slate-200 p-8 shadow-sm max-w-2xl mx-auto mt-10">
                    <h2 class="text-xl font-bold mb-6">Profil Instansi</h2>
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-400 uppercase">Nama Instansi</label>
                                <input type="text" value="Dinas Komunikasi & Informatika" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-400 uppercase">Kode Instansi</label>
                                <input type="text" value="KOMINFO-01" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Logo Instansi</label>
                            <div class="w-full h-32 border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center text-slate-400 cursor-pointer hover:bg-slate-50">
                                Unggah Logo Baru
                            </div>
                        </div>
                        <button class="w-full py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-lg shadow-blue-100">
                            Simpan Perubahan
                        </button>
                    </div>
                </div>
            `;
        }

        function renderEmpty(container, icon, title, desc) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-slate-400 animate-in fade-in duration-700">
                    <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-6 text-blue-500">
                        <i data-lucide="${icon.toLowerCase()}" class="w-10 h-10"></i>
                    </div>
                    <h2 class="text-xl font-bold text-slate-900">${title}</h2>
                    <p class="text-slate-500 max-w-sm text-center mt-2 leading-relaxed">${desc}</p>
                    <button class="mt-8 px-6 py-2 bg-slate-900 text-white rounded-lg font-bold hover:bg-slate-800 transition-colors">
                        Mulai Konfigurasi
                    </button>
                </div>
            `;
        }

        // --- Event Handlers ---

        function openModal() {
            const isMasuk = state.activeTab === 'surat-masuk';
            document.getElementById('modal-title').innerText = isMasuk ? 'Tambah Surat Masuk' : 'Tambah Surat Keluar';
            document.getElementById('label-origin').innerText = isMasuk ? 'Pengirim' : 'Penerima';
            document.getElementById('modal-container').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
            document.getElementById('mail-form').reset();
        }

        function handleAddMail(e) {
            e.preventDefault();
            const type = state.activeTab === 'surat-masuk' ? 'incoming' : 'outgoing';
            const idPrefix = type === 'incoming' ? 'IN' : 'OUT';
            
            const newItem = {
                id: idPrefix + '-' + Math.floor(100 + Math.random() * 900),
                title: document.getElementById('form-title').value,
                date: new Date().toISOString().split('T')[0],
                priority: document.getElementById('form-priority').value,
                description: document.getElementById('form-description').value,
                status: type === 'incoming' ? 'Pending' : 'Draft',
                category: 'Umum'
            };

            if (type === 'incoming') {
                newItem.sender = document.getElementById('form-origin').value;
            } else {
                newItem.recipient = document.getElementById('form-origin').value;
            }

            state.data[type].unshift(newItem);
            closeModal();
            updateView();
        }

        function deleteItem(id) {
            const type = id.indexOf('IN') === 0 ? 'incoming' : 'outgoing';
            state.data[type] = state.data[type].filter(function(item) { return item.id !== id; });
            updateView();
        }

        // Boot
        window.onload = init;
    </script>
</body>
</html>
